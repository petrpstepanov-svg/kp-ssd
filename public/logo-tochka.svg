<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Оранжевый кружок-точка -->
  <circle cx="18" cy="20" r="14" fill="#F97316"/>
  <!-- Белый плюс внутри кружка -->
  <path d="M18 11 L18 29 M9 20 L27 20" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Текст «ТОЧКА» — чёрный жирный -->
  <text x="40" y="27" font-family="Inter, Manrope, Arial, sans-serif" font-size="22" font-weight="800" fill="#1a1a1a">ТОЧКА</text>
  <!-- Плюс — оранжевый акцент -->
  <text x="140" y="27" font-family="Inter, Manrope, Arial, sans-serif" font-size="24" font-weight="900" fill="#F97316">+</text>
</svg>
