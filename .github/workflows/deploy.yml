name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Sync to Yandex Cloud Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          aws s3 sync ./out s3://${{ secrets.YC_BUCKET_NAME }} \
            --endpoint-url https://storage.yandexcloud.net \
            --delete

      - name: Deploy complete
        run: |
          echo "Deployed to https://${{ secrets.YC_BUCKET_NAME }}.website.yandexcloud.net"
